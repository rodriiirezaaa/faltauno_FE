<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falta Uno - Inicio</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/inicio.css">
</head>
<body>

    <header class="main-header">
        <div class="header-left">
            <img src="logo.png" alt="Falta Uno" class="header-logo" onclick="window.location.href='inicio.html'" style="cursor: pointer;">
            
            <nav class="nav-links">
                <a href="inicio.html" class="active">Mapa</a>
                <a href="feed.html">Tablón de Partidos</a>
                <a href="crearAlerta.html">Crear Alerta</a>
                <a href="proponerCancha.html">Proponer Cancha</a>
            </nav>
        </div>

        <div class="header-right">
            <div class="user-profile-btn" onclick="toggleMenu()">
                <div class="user-avatar" id="nav-avatar-char">?</div>
                <span id="nav-user-name">Usuario</span>
            </div>
            
            <div class="dropdown-menu" id="userMenu">
                <a href="perfilUser.html">Mi Perfil <span>></span></a>
                <a href="configuracion.html">Configuración <span>></span></a>
                <a href="ayuda.html">Ayuda y Soporte <span>></span></a>
                <a href="panelAdmin.html">Panel Admin <span>></span></a>
                <a href="login.html" class="logout-link">Cerrar sesión <span>x</span></a>
            </div>
        </div>
    </header>
    
    <main class="main-content">
        
        <div class="map-section">
            <div id="map"></div>
        </div>

        <aside class="sidebar">
            <div class="filtro-calidad-container" style="margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
               <label>Calidad de la cancha:</label>
                <select id="filtro-estado" class="filtro-select">
                    <option value="Todas">Todas las calidades</option>
                    <option value="Excelente">Excelente</option> 
                    <option value="Bueno">Bueno</option>
                    <option value="Regular">Regular</option>
                    <option value="Malo">Malo</option>
                </select>
            </div>

            <h2>Canchas en tu zona</h2>
            <div class="cancha-list" id="lista-canchas">
                <p>Cargando canchas...</p>
            </div>
        </aside>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/global.js"></script>
    <script src="js/inicio.js"></script>
</body>
</html>
